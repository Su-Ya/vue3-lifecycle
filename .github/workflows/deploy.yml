name: Deploy Vue3 to GitHub Pages

on:
  push:
    branches:
      - main
      - master

  # 允許你從 Actions 標籤手動執行此工作流程
  workflow_dispatch:

# 賦予 GitHub Token 權限以部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許並行部署，但會取消正在進行的部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 將 build 出來的 dist 資料夾上傳
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
